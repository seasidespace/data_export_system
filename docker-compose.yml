services:
  ingestor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: market-ingestor
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./src:/app/src
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; print(httpx.get('http://localhost:8000/health').status_code)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
